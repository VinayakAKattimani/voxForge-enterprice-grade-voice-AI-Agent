services:

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile

    container_name: voxforge-gateway

    ports:
      - "8000:8000"

    env_file:
      - ./gateway/.env

    depends_on:
      - auth-service
      - conversation-service
      - llm-service
      - knowledge-service

    restart: unless-stopped

    networks:
      - voxforge-network


  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile

    container_name: voxforge-auth-service

    ports:
      - "8001:8001"

    env_file:
      - ./services/auth-service/.env

    restart: unless-stopped

    networks:
      - voxforge-network


  conversation-service:
    build:
      context: ./services/conversation-service
      dockerfile: Dockerfile

    container_name: voxforge-conversation-service

    ports:
      - "8002:8002"

    env_file:
      - ./services/conversation-service/.env

    restart: unless-stopped

    networks:
      - voxforge-network


  llm-service:
    build:
      context: ./services/llm-service
      dockerfile: Dockerfile

    container_name: voxforge-llm-service

    ports:
      - "8003:8003"

    env_file:
      - ./services/llm-service/.env

    restart: unless-stopped

    networks:
      - voxforge-network


  knowledge-service:
    build:
      context: ./services/knowledge-service
      dockerfile: Dockerfile

    container_name: voxforge-knowledge-service

    ports:
      - "8004:8004"

    env_file:
      - ./services/knowledge-service/.env

    depends_on:
      - qdrant
      - kafka

    restart: unless-stopped

    networks:
      - voxforge-network


  qdrant:
    image: qdrant/qdrant:latest

    container_name: voxforge-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    restart: unless-stopped

    networks:
      - voxforge-network


  kafka:
    image: apache/kafka:3.9.1

    container_name: voxforge-kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    restart: unless-stopped

    networks:
      - voxforge-network


  kafka-ui:
    image: provectuslabs/kafka-ui:latest

    container_name: voxforge-kafka-ui

    ports:
      - "8085:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: voxforge
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    depends_on:
      - kafka

    restart: unless-stopped

    networks:
      - voxforge-network


networks:
  voxforge-network:
    driver: bridge


volumes:
  qdrant_data: