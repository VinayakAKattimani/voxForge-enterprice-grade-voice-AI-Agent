version: "3.9"

services:

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile

    container_name: voxforge-gateway

    ports:
      - "8000:8000"

    env_file:
      - ./gateway/.env

    depends_on:
      - auth-service
      - conversation-service
      - llm-service
      - knowledge-service

    restart: unless-stopped

    networks:
      - voxforge-network


  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile

    container_name: voxforge-auth-service

    ports:
      - "8001:8001"

    env_file:
      - ./services/auth-service/.env

    restart: unless-stopped

    networks:
      - voxforge-network


  conversation-service:
    build:
      context: ./services/conversation-service
      dockerfile: Dockerfile

    container_name: voxforge-conversation-service

    ports:
      - "8002:8002"

    env_file:
      - ./services/conversation-service/.env

    restart: unless-stopped

    networks:
      - voxforge-network


  llm-service:
    build:
      context: ./services/llm-service
      dockerfile: Dockerfile

    container_name: voxforge-llm-service

    ports:
      - "8003:8003"

    env_file:
      - ./services/llm-service/.env

    restart: unless-stopped

    networks:
      - voxforge-network


  knowledge-service:
    build:
      context: ./services/knowledge-service
      dockerfile: Dockerfile

    container_name: voxforge-knowledge-service

    ports:
      - "8004:8004"

    env_file:
      - ./services/knowledge-service/.env

    depends_on:
      - qdrant

    restart: unless-stopped

    networks:
      - voxforge-network


  qdrant:
    image: qdrant/qdrant:latest

    container_name: voxforge-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    restart: unless-stopped

    networks:
      - voxforge-network


networks:
  voxforge-network:
    driver: bridge


volumes:
  qdrant_data: